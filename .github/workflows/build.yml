name: Build Wine for Winlator Bionic (ntsync, WCP)

on:
  workflow_dispatch:
    inputs:
      wine_version:
        description: 'Wine version (e.g. 11.5)'
        required: false
        default: '11.5'
      prerelease:
        description: 'Mark release as pre-release'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [aarch64, x86_64]
      fail-fast: false

    env:
      WINE_VERSION: ${{ github.event.inputs.wine_version || '11.5' }}
      NDK_VERSION: 27.3.13750724
      NDK_ZIP: android-ndk-r27d-linux.zip
      LLVM_MINGW_TAG: 20250920
      LLVM_MINGW_PKG: llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64
      TERMUXFS_TAG: build-20260218

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git wget curl unzip \
            flex bison gettext autoconf automake libtool pkg-config \
            mingw-w64 gcc-multilib g++-multilib \
            libfreetype6-dev libfreetype6-dev:i386 \
            libpng-dev libpng-dev:i386 \
            zlib1g-dev zlib1g-dev:i386

      - name: Download Wine ${{ env.WINE_VERSION }} source
        run: |
          MINOR=$(echo "$WINE_VERSION" | cut -d. -f2)
          [ "$MINOR" = "0" ] && URL_VER="$(echo $WINE_VERSION | cut -d. -f1).0" || URL_VER="$(echo $WINE_VERSION | cut -d. -f1).x"
          wget -q --show-progress "https://dl.winehq.org/wine/source/${URL_VER}/wine-${WINE_VERSION}.tar.xz"
          tar xf "wine-${WINE_VERSION}.tar.xz"
          mv "wine-${WINE_VERSION}" wine-src

      - name: Download GameNative Android patches
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/GameNative/proton-wine.git gn-proton
          cd gn-proton && git sparse-checkout set android
          echo "Patches:" && ls android/patches/
          # Copy android/ into wine-src so patched includes resolve correctly
          # (patches reference ../../android/android_sysvshm/sys/shm.h)
          cp -r android ../wine-src/android

      - name: Apply Android patches
        run: |
          cd wine-src
          PATCHES=(
            android_network.patch dlls_nsiproxy_sys_ip_c.patch
            midi_support.patch dlls_winebus_sys_bus_sdl_c.patch
            dlls_ntdll_unix_esync_c.patch dlls_ntdll_unix_fsync_c.patch
            server_esync_c.patch server_fsync_c.patch
            dlls_winex11_drv_x11drv_h.patch dlls_winex11_drv_bitblt_c.patch
            dlls_winex11_drv_desktop_c.patch dlls_winex11_drv_mouse_c.patch
            dlls_winex11_drv_window_c.patch dlls_winex11_drv_x11drv_main_c.patch
            dlls_ntdll_unix_virtual_c.patch loader_preloader_c.patch
            dlls_ntdll_unix_signal_x86_64_c.patch
            dlls_winepulse_drv_pulse_c.patch programs_explorer_desktop_c.patch
            dlls_ntdll_unix_server_c.patch dlls_amd_ags_x64_unixlib_c.patch
            dlls_winex11_drv_opengl_c.patch
            programs_winemenubuilder_winemenubuilder_c.patch
            dlls_advapi32_advapi_c.patch
            programs_winebrowser_makefile_in.patch programs_winebrowser_main_c.patch
            dlls_user32_makefile_in.patch dlls_user32_clipboard_c.patch
            dlls_win32u_clipboard_c.patch
            dlls_ntdll_loader_c.patch dlls_ntdll_unix_loader_c.patch
            dlls_wow64_syscall_c.patch loader_wine_inf_in.patch
            programs_wineboot_wineboot_c.patch dlls_wdscore_wdscore_spec.patch
          )
          APPLIED=0; SKIPPED=0
          for p in "${PATCHES[@]}"; do
            PF="../gn-proton/android/patches/$p"
            if [ ! -f "$PF" ]; then echo "MISSING: $p"; SKIPPED=$((SKIPPED+1)); continue; fi
            if git apply --check "$PF" 2>/dev/null; then
              git apply "$PF" && echo "OK: $p" && APPLIED=$((APPLIED+1))
            else
              echo "SKIP (conflict): $p"; SKIPPED=$((SKIPPED+1))
            fi
          done
          echo "Applied=$APPLIED Skipped=$SKIPPED"

      - name: Prepare Wine source
        run: |
          cd wine-src
          dlls/winevulkan/make_vulkan || true
          tools/make_requests && tools/make_specfiles
          autoreconf -f

      - name: Cache wine-tools
        id: cache-wine-tools
        uses: actions/cache@v4
        with:
          path: wine-tools
          key: wine-tools-${{ env.WINE_VERSION }}-${{ hashFiles('wine-src/configure.ac') }}

      - name: Build wine-tools (host)
        if: steps.cache-wine-tools.outputs.cache-hit != 'true'
        run: |
          mkdir wine-tools && cd wine-tools
          ../wine-src/configure --without-x --without-gstreamer --without-vulkan --without-wayland
          make -j$(nproc) __tooldeps__ nls/all

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/Android/Sdk/ndk/${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_ZIP }}

      - name: Download Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/Android/Sdk/ndk && cd ~/Android/Sdk/ndk
          wget -q --show-progress "https://dl.google.com/android/repository/$NDK_ZIP"
          unzip -q "$NDK_ZIP" && mv android-ndk-r27d "$NDK_VERSION"

      - name: Cache llvm-mingw
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: ~/toolchains/${{ env.LLVM_MINGW_PKG }}
          key: llvm-mingw-${{ env.LLVM_MINGW_TAG }}

      - name: Download llvm-mingw
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/toolchains && cd ~/toolchains
          wget -q --show-progress \
            "https://github.com/bylaws/llvm-mingw/releases/download/${LLVM_MINGW_TAG}/${LLVM_MINGW_PKG}.tar.xz"
          tar xf "${LLVM_MINGW_PKG}.tar.xz"

      - name: Download Termux sysroot (${{ matrix.arch }})
        run: |
          mkdir -p ~/termuxfs/${{ matrix.arch }} && cd ~/termuxfs/${{ matrix.arch }}
          wget -q --show-progress \
            "https://github.com/GameNative/termux-on-gha/releases/download/${TERMUXFS_TAG}/termuxfs-${{ matrix.arch }}.tar"
          tar xf "termuxfs-${{ matrix.arch }}.tar"

      - name: Build android_sysvshm (${{ matrix.arch }})
        if: matrix.arch == 'aarch64'
        run: |
          TOOLCHAIN=~/Android/Sdk/ndk/${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin
          DEPS=~/termuxfs/aarch64/data/data/com.termux/files/usr
          cp -r gn-proton/android/android_sysvshm android_sysvshm
          cd android_sysvshm
          CC="$TOOLCHAIN/aarch64-linux-android28-clang" make -f Makefile
          mkdir -p "$DEPS/lib"
          find . -name "*.so" -exec cp {} "$DEPS/lib/" \;
          echo "sysvshm libs: $(ls $DEPS/lib/libandroid-sysvshm* 2>/dev/null || echo 'not found, continuing')"

      - name: Configure Wine (${{ matrix.arch }})
        run: |
          DEPS=~/termuxfs/${{ matrix.arch }}/data/data/com.termux/files/usr
          TOOLCHAIN=~/Android/Sdk/ndk/${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin
          LLVM_MINGW=~/toolchains/${LLVM_MINGW_PKG}/bin
          RUNTIME=/data/data/com.termux/files/usr
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            TARGET=aarch64-linux-android28; WIN_ARCH="arm64ec,aarch64,i386"; ARCH_CFLAGS=""
          else
            TARGET=x86_64-linux-android28; WIN_ARCH="x86_64,i386"; ARCH_CFLAGS="-march=x86-64 -mtune=generic"
          fi
          export PATH=$LLVM_MINGW:$PATH
          export CC=$TOOLCHAIN/$TARGET-clang CXX=$TOOLCHAIN/$TARGET-clang++
          export AR=$TOOLCHAIN/llvm-ar RANLIB=$TOOLCHAIN/llvm-ranlib STRIP=$TOOLCHAIN/llvm-strip
          export DLLTOOL=$LLVM_MINGW/llvm-dlltool
          export PKG_CONFIG_LIBDIR=$DEPS/lib/pkgconfig:$DEPS/share/pkgconfig
          export ACLOCAL_PATH=$DEPS/lib/aclocal:$DEPS/share/aclocal
          export CPPFLAGS="-I$DEPS/include --sysroot=$TOOLCHAIN/../sysroot"
          WARN="-Wno-declaration-after-statement -Wno-implicit-function-declaration -Wno-int-conversion"
          export CFLAGS="$ARCH_CFLAGS $WARN" CXXFLAGS="$ARCH_CFLAGS $WARN"
          export LDFLAGS="-L$DEPS/lib -Wl,-rpath=$RUNTIME/lib"
          export FREETYPE_CFLAGS="-I$DEPS/include/freetype2"
          export PULSE_CFLAGS="-I$DEPS/include/pulse"
          export PULSE_LIBS="-L$DEPS/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$DEPS/include/SDL2" SDL2_LIBS="-L$DEPS/lib -lSDL2"
          export X_CFLAGS="-I$DEPS/include/X11" X_LIBS="-landroid-sysvshm"
          export GSTREAMER_CFLAGS="-I$DEPS/include/gstreamer-1.0 -I$DEPS/include/glib-2.0 -I$DEPS/lib/glib-2.0/include"
          export GSTREAMER_LIBS="-L$DEPS/lib -lgstgl-1.0 -lgstapp-1.0 -lgstvideo-1.0 -lgstaudio-1.0 -lglib-2.0 -lgobject-2.0 -lgio-2.0 -lgstbase-1.0 -lgstreamer-1.0"
          export FFMPEG_CFLAGS="-I$DEPS/include/libavutil -I$DEPS/include/libavcodec -I$DEPS/include/libavformat"
          export FFMPEG_LIBS="-L$DEPS/lib -lavutil -lavcodec -lavformat"
          INSTALL_DIR=$DEPS/../opt/wine
          mkdir -p build-${{ matrix.arch }} && cd build-${{ matrix.arch }}
          ../wine-src/configure \
            --enable-archs=$WIN_ARCH \
            --host=$TARGET \
            --prefix=$INSTALL_DIR \
            --bindir=$INSTALL_DIR/bin \
            --libdir=$INSTALL_DIR/lib \
            --exec-prefix=$INSTALL_DIR \
            --with-mingw=clang \
            --with-wine-tools=../wine-tools \
            --enable-win64 --disable-win16 --enable-nls \
            --disable-amd_ags_x64 --enable-wineandroid_drv=no --disable-tests \
            --with-alsa --without-capi --without-coreaudio --without-cups \
            --without-dbus --without-ffmpeg --with-fontconfig --with-freetype \
            --without-gcrypt --without-gettext --with-gettextpo=no \
            --without-gphoto --with-gnutls --without-gssapi --with-gstreamer \
            --without-inotify --without-krb5 --without-netapi --without-opencl \
            --with-opengl --without-osmesa --without-oss --without-pcap \
            --without-pcsclite --with-pthread --with-pulse --without-sane \
            --with-sdl --without-udev --without-unwind --without-usb \
            --without-v4l2 --with-vulkan --without-wayland \
            --without-xcomposite --without-xcursor --without-xfixes \
            --without-xinerama --without-xinput --without-xinput2 \
            --without-xrandr --without-xrender --without-xshape \
            --with-xshm --without-xxf86vm

      - name: Build Wine (${{ matrix.arch }})
        run: |
          DEPS=~/termuxfs/${{ matrix.arch }}/data/data/com.termux/files/usr
          TOOLCHAIN=~/Android/Sdk/ndk/${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin
          LLVM_MINGW=~/toolchains/${LLVM_MINGW_PKG}/bin
          if [ "${{ matrix.arch }}" = "aarch64" ]; then TARGET=aarch64-linux-android28
          else TARGET=x86_64-linux-android28; fi
          export PATH=$LLVM_MINGW:$PATH
          export CC=$TOOLCHAIN/$TARGET-clang CXX=$TOOLCHAIN/$TARGET-clang++
          export AR=$TOOLCHAIN/llvm-ar RANLIB=$TOOLCHAIN/llvm-ranlib
          export PKG_CONFIG_LIBDIR=$DEPS/lib/pkgconfig:$DEPS/share/pkgconfig
          cd build-${{ matrix.arch }}
          make -j$(nproc)

      - name: Install + Package WCP (${{ matrix.arch }})
        run: |
          DEPS=~/termuxfs/${{ matrix.arch }}/data/data/com.termux/files/usr
          INSTALL_DIR=$DEPS/../opt/wine
          OUTPUT=~/compiled-files-${{ matrix.arch }}
          ARCH_NAME=${{ matrix.arch == 'aarch64' && 'arm64ec' || 'x86_64' }}
          mkdir -p $OUTPUT/bin $OUTPUT/lib $OUTPUT/share
          cd build-${{ matrix.arch }} && make install -j$(nproc)
          cp -r $INSTALL_DIR/bin/wine* $OUTPUT/bin/ 2>/dev/null || true
          cp -r $INSTALL_DIR/bin/reg* $INSTALL_DIR/bin/msi* $OUTPUT/bin/ 2>/dev/null || true
          cp -r $INSTALL_DIR/bin/notepad $OUTPUT/bin/ 2>/dev/null || true
          cp -r $INSTALL_DIR/lib/wine $OUTPUT/lib/ 2>/dev/null || true
          cp -r $INSTALL_DIR/share/wine $OUTPUT/share/ 2>/dev/null || true
          # Download prefixPack
          wget -q "https://github.com/GameNative/bionic-prefix-files/raw/main/prefixPack-${ARCH_NAME}.txz" \
            -O $OUTPUT/prefixPack.txz
          # Write profile.json
          cat > $OUTPUT/profile.json << EOF
          {
            "type": "Wine",
            "versionName": "${WINE_VERSION}-ntsync-${ARCH_NAME}",
            "versionCode": 0,
            "description": "Wine ${WINE_VERSION} ntsync ${ARCH_NAME} with Android/Termux patches",
            "files": [],
            "wine": {
              "binPath": "bin",
              "libPath": "lib",
              "prefixPack": "prefixPack.txz"
            }
          }
          EOF
          # Pack WCP
          WCP="$GITHUB_WORKSPACE/wine-${WINE_VERSION}-ntsync-${ARCH_NAME}.wcp.xz"
          cd $OUTPUT && tar cJf "$WCP" bin lib share prefixPack.txz profile.json
          sha256sum "$WCP" > "${WCP}.sha256"
          echo "WCP size: $(du -sh $WCP)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-${{ env.WINE_VERSION }}-${{ matrix.arch }}
          path: |
            wine-${{ env.WINE_VERSION }}-ntsync-${{ matrix.arch == 'aarch64' && 'arm64ec' || 'x86_64' }}.wcp.xz
            wine-${{ env.WINE_VERSION }}-ntsync-${{ matrix.arch == 'aarch64' && 'arm64ec' || 'x86_64' }}.wcp.xz.sha256
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-24.04
    env:
      WINE_VERSION: ${{ github.event.inputs.wine_version || '11.5' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.WINE_VERSION }}-ntsync-bionic
          name: "Wine ${{ env.WINE_VERSION }} ntsync — Winlator Bionic WCP"
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: artifacts/**/*.wcp.xz*
          body: |
            ## Wine ${{ env.WINE_VERSION }} — Winlator Bionic WCP (ntsync)

            | Field | Value |
            |-------|-------|
            | Wine | `${{ env.WINE_VERSION }}` vanilla |
            | Target | `aarch64/x86_64-linux-android28` (Android NDK) |
            | Sysroot | Termux (`/data/data/com.termux/files/usr`) |
            | PE toolchain | bylaws llvm-mingw `${{ env.LLVM_MINGW_TAG }}` (arm64ec + x86_64 + i386) |
            | Patches | GameNative Android patches |
            | Sync | ntsync / fsync / esync |
            | Format | `.wcp.xz` |

            ### Files
            | File | For |
            |------|-----|
            | `*-arm64ec.wcp.xz` | ARM64 devices |
            | `*-x86_64.wcp.xz` | x86_64 devices |

            ### Install
            Import `.wcp.xz` in Winlator Bionic / CMOD / Ludashi via Component Manager → Wine Version

            ### Credits
            Patches + prefixPack + Termux sysroot: [GameNative](https://github.com/GameNative)
            llvm-mingw: [bylaws/llvm-mingw](https://github.com/bylaws/llvm-mingw)
